<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="2048" height="682" viewBox="0 0 2048 682" role="img" aria-labelledby="title desc">
  <title id="title">NEMESIS banner vector approximation</title>
  <desc id="desc">NEMESIS. She who catches hubris in agents. A Python evaluation harness for agentic failure modes.</desc>
  <defs>
    <radialGradient id="bgGlow" cx="77%" cy="51%" r="48%">
      <stop offset="0%" stop-color="#182a3d"/>
      <stop offset="45%" stop-color="#07111f"/>
      <stop offset="100%" stop-color="#030812"/>
    </radialGradient>
    <linearGradient id="orangeLine" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ff5f38"/>
      <stop offset="54%" stop-color="#ff9a32"/>
      <stop offset="100%" stop-color="#182235" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="textMetal" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="45%" stop-color="#dfe6ec"/>
      <stop offset="100%" stop-color="#aab3bd"/>
    </linearGradient>
    <filter id="softGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="2048" height="682" fill="#030812"/>
  <rect x="0" y="0" width="2048" height="682" fill="url(#bgGlow)"/>
  <g opacity="0.35">
